<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:20px 24px;background:var(--rk-paper);font-family:var(--rk-font-body);color:var(--rk-text-body);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .sw{flex:1;min-width:90px;border-radius:var(--rk-radius-sm);overflow:hidden;border:1px solid var(--rk-border);background:#fff;}
  .sw .chip{height:64px;}
  .sw .meta{padding:7px 10px;}
  .sw .nm{font-weight:700;font-size:13px;color:var(--rk-text-strong);}
  .sw .hex{font-family:var(--rk-font-mono);font-size:11px;color:var(--rk-text-muted);letter-spacing:.02em;}
  .sw .tok{font-family:var(--rk-font-mono);font-size:10.5px;color:var(--rk-text-muted);}
  h4{font-family:var(--rk-font-display);margin:0 0 3px;}
  .b{font-family:var(--rk-font-body);color:var(--rk-text-body);margin:0 0 8px;max-width:600px;}
</style>
</head><body>
<h4 style="color:var(--rk-text-muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;">Mulish</h4>
<p class="b" style="font-size:18px;line-height:1.65;">Report Kitchen turns dense PDFs into interactive, accessible, fully responsive websites — so your audience can <strong>truly interact with your content</strong> instead of just downloading it.</p>
<p class="b" style="font-size:14px;color:var(--rk-text-muted);">Regular 400 · Medium 500 · Semibold 600 · Bold 700</p>
