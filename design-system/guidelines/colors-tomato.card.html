<!-- @dsCard group="Colors" viewport="700x150" name="Tomato ramp" subtitle="Primary action / brand red" -->
<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:20px 24px;background:var(--rk-paper);font-family:var(--rk-font-body);color:var(--rk-text-body);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .sw{flex:1;min-width:90px;border-radius:var(--rk-radius-sm);overflow:hidden;border:1px solid var(--rk-border);background:#fff;}
  .sw .chip{height:64px;}
  .sw .meta{padding:7px 10px;}
  .sw .nm{font-weight:700;font-size:13px;color:var(--rk-text-strong);}
  .sw .hex{font-family:var(--rk-font-mono);font-size:11px;color:var(--rk-text-muted);letter-spacing:.02em;}
  .sw .tok{font-family:var(--rk-font-mono);font-size:10.5px;color:var(--rk-text-muted);}
  h4{font-family:var(--rk-font-display);margin:0 0 3px;}
  
</style>
</head><body>
<div class="row"><div class="sw"><div class="chip" style="background:#A31E1C"></div><div class="meta"><div class="nm">700</div><div class="hex">#A31E1C</div><div class="tok">--rk-tomato-700</div></div></div><div class="sw"><div class="chip" style="background:#BD2523"></div><div class="meta"><div class="nm">600</div><div class="hex">#BD2523</div><div class="tok">--rk-tomato-600</div></div></div><div class="sw"><div class="chip" style="background:#D72E2C"></div><div class="meta"><div class="nm">500</div><div class="hex">#D72E2C</div><div class="tok">--rk-tomato-500</div></div></div><div class="sw"><div class="chip" style="background:#EC8A88"></div><div class="meta"><div class="nm">300</div><div class="hex">#EC8A88</div><div class="tok">--rk-tomato-300</div></div></div><div class="sw"><div class="chip" style="background:#FBE1E0"></div><div class="meta"><div class="nm">100</div><div class="hex">#FBE1E0</div><div class="tok">--rk-tomato-100</div></div></div></div>
</body></html>
