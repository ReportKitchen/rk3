<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & elevation" subtitle="Modest radii; shadow on hover, hard offset for accents" -->
<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:20px 24px;background:var(--rk-paper);font-family:var(--rk-font-body);color:var(--rk-text-body);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .sw{flex:1;min-width:90px;border-radius:var(--rk-radius-sm);overflow:hidden;border:1px solid var(--rk-border);background:#fff;}
  .sw .chip{height:64px;}
  .sw .meta{padding:7px 10px;}
  .sw .nm{font-weight:700;font-size:13px;color:var(--rk-text-strong);}
  .sw .hex{font-family:var(--rk-font-mono);font-size:11px;color:var(--rk-text-muted);letter-spacing:.02em;}
  .sw .tok{font-family:var(--rk-font-mono);font-size:10.5px;color:var(--rk-text-muted);}
  h4{font-family:var(--rk-font-display);margin:0 0 3px;}
  .box{width:74px;height:56px;background:#fff;border:1px solid var(--rk-border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-family:var(--rk-font-mono);font-size:10px;color:var(--rk-text-muted);}
</style>
</head><body>
<div class="row" style="align-items:center;">
<div class="box" style="border-radius:4px;">4</div>
<div class="box" style="border-radius:8px;">8</div>
<div class="box" style="border-radius:12px;">12</div>
<div class="box" style="border-radius:18px;">18</div>
<div class="box" style="border-radius:999px;">pill</div>
<div class="box" style="border-radius:8px;box-shadow:var(--rk-shadow-md);border:none;">md</div>
<div class="box" style="border-radius:8px;box-shadow:6px 6px 0 var(--rk-rhino-900);border:2px solid var(--rk-rhino-900);">offset</div>
</div>
</body></html>
