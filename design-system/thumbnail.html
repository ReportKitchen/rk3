<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;padding:0;}
  .tile{width:1280px;height:854px;display:flex;overflow:hidden;}
  .main{flex:1;background:var(--rk-tomato-500);display:flex;align-items:center;justify-content:center;}
  .main img{width:64%;max-width:640px;}
  .strip{width:300px;display:flex;flex-direction:column;}
  .strip > div{flex:1;}
</style></head>
<body>
  <div class="tile">
    <div class="main"><img src="assets/logo-white.svg" alt="Report Kitchen"></div>
    <div class="strip">
      <div style="background:#F2BB2E"></div>
      <div style="background:#7683A2"></div>
      <div style="background:#303D61"></div>
    </div>
  </div>
</body></html>
