<!-- @dsCard group="Website" viewport="1280x840" name="Report Kitchen — Marketing Site" subtitle="Interactive click-through: Home, Our Work, Profile, Offering, Pattern Library" -->
<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Report Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;padding:0;}
  body{background:var(--rk-surface-page);color:var(--rk-text-body);font-family:var(--rk-font-body);-webkit-font-smoothing:antialiased;}
  a{color:var(--rk-text-link);}
  a:hover{color:var(--rk-text-link-hover);}
  ::selection{background:var(--rk-macaroni-300);}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="OurWork.jsx"></script>
<script type="text/babel" src="ProjectProfile.jsx"></script>
<script type="text/babel" src="OfferingCustom.jsx"></script>
<script type="text/babel" src="PatternLibrary.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Insights.jsx"></script>
<script type="text/babel">
  const S = window.RKSite;
  const ce = React.createElement;

  function Placeholder({ title, sub, go }) {
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
    return ce("section", { style: { maxWidth: 760, margin: "0 auto", padding: "96px 40px", textAlign: "center", display: "flex", flexDirection: "column", gap: 18, alignItems: "center" } }, [
      ce("div", { key: "ic", style: { width: 64, height: 64, borderRadius: "var(--rk-radius-lg)", background: "var(--rk-macaroni-100)", display: "flex", alignItems: "center", justifyContent: "center" } }, ce("i", { "data-lucide": "utensils", width: 30, height: 30, style: { color: "var(--rk-macaroni-600)" } })),
      ce("h1", { key: "h", style: { margin: 0, fontFamily: "var(--rk-font-display)", fontWeight: 800, fontSize: 48, letterSpacing: "-0.02em", color: "var(--rk-text-strong)" } }, title),
      ce("p", { key: "p", style: { margin: 0, fontFamily: "var(--rk-font-body)", fontSize: 19, lineHeight: 1.6, color: "var(--rk-text-muted)" } }, sub),
    ]);
  }

  function App() {
    const [route, setRoute] = React.useState("home");
    const go = (r) => { setRoute(r); window.scrollTo({ top: 0 }); };
    React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [route]);

    let screen;
    if (route === "home") screen = ce(S.Home, { go });
    else if (route === "work") screen = ce(S.OurWork, { go });
    else if (route === "profile") screen = ce(S.ProjectProfile, { go });
    else if (route === "patterns") screen = ce(S.PatternLibrary, { go });
    else if (["custom", "maker", "express", "consulting"].includes(route)) screen = ce(S.OfferingCustom, { go });
    else if (route === "insights") screen = ce(S.Insights, { go });
    else if (route === "about") screen = ce(S.About, { go });
    else screen = ce(S.Home, { go });

    const navRoute = ["work", "patterns", "insights", "about"].includes(route) ? route : null;
    return ce("div", null, [
      ce(S.Header, { key: "h", current: navRoute, go }),
      ce("main", { key: "m" }, screen),
      ce(S.Footer, { key: "f", go }),
    ]);
  }

  ReactDOM.createRoot(document.getElementById("root")).render(ce(App));
  setTimeout(() => window.lucide && window.lucide.createIcons(), 120);
</script>
</body></html>
