<!-- @dsCard group="Colors" viewport="700x150" name="Rhino / ink ramp" subtitle="Cool neutrals from the navy; 300 == Blueberry Muffin" -->
<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:20px 24px;background:var(--rk-paper);font-family:var(--rk-font-body);color:var(--rk-text-body);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .sw{flex:1;min-width:90px;border-radius:var(--rk-radius-sm);overflow:hidden;border:1px solid var(--rk-border);background:#fff;}
  .sw .chip{height:64px;}
  .sw .meta{padding:7px 10px;}
  .sw .nm{font-weight:700;font-size:13px;color:var(--rk-text-strong);}
  .sw .hex{font-family:var(--rk-font-mono);font-size:11px;color:var(--rk-text-muted);letter-spacing:.02em;}
  .sw .tok{font-family:var(--rk-font-mono);font-size:10.5px;color:var(--rk-text-muted);}
  h4{font-family:var(--rk-font-display);margin:0 0 3px;}
  
</style>
</head><body>
<div class="row"><div class="sw"><div class="chip" style="background:#1E2740"></div><div class="meta"><div class="nm">900</div><div class="hex">#1E2740</div><div class="tok">--rk-rhino-900</div></div></div><div class="sw"><div class="chip" style="background:#303D61"></div><div class="meta"><div class="nm">700</div><div class="hex">#303D61</div><div class="tok">--rk-rhino-700</div></div></div><div class="sw"><div class="chip" style="background:#4C5A80"></div><div class="meta"><div class="nm">500</div><div class="hex">#4C5A80</div><div class="tok">--rk-rhino-500</div></div></div><div class="sw"><div class="chip" style="background:#7683A2"></div><div class="meta"><div class="nm">300</div><div class="hex">#7683A2</div><div class="tok">--rk-rhino-300</div></div></div><div class="sw"><div class="chip" style="background:#A9B2C6"></div><div class="meta"><div class="nm">200</div><div class="hex">#A9B2C6</div><div class="tok">--rk-rhino-200</div></div></div><div class="sw"><div class="chip" style="background:#D5DAE4"></div><div class="meta"><div class="nm">100</div><div class="hex">#D5DAE4</div><div class="tok">--rk-rhino-100</div></div></div></div>
</body></html>
