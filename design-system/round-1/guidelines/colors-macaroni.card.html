<!-- @dsCard group="Colors" viewport="700x150" name="Macaroni ramp" subtitle="Bright accent / highlight — use in small doses" -->
<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:20px 24px;background:var(--rk-paper);font-family:var(--rk-font-body);color:var(--rk-text-body);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .sw{flex:1;min-width:90px;border-radius:var(--rk-radius-sm);overflow:hidden;border:1px solid var(--rk-border);background:#fff;}
  .sw .chip{height:64px;}
  .sw .meta{padding:7px 10px;}
  .sw .nm{font-weight:700;font-size:13px;color:var(--rk-text-strong);}
  .sw .hex{font-family:var(--rk-font-mono);font-size:11px;color:var(--rk-text-muted);letter-spacing:.02em;}
  .sw .tok{font-family:var(--rk-font-mono);font-size:10.5px;color:var(--rk-text-muted);}
  h4{font-family:var(--rk-font-display);margin:0 0 3px;}
  
</style>
</head><body>
<div class="row"><div class="sw"><div class="chip" style="background:#D99B12"></div><div class="meta"><div class="nm">600</div><div class="hex">#D99B12</div><div class="tok">--rk-macaroni-600</div></div></div><div class="sw"><div class="chip" style="background:#F2BB2E"></div><div class="meta"><div class="nm">500</div><div class="hex">#F2BB2E</div><div class="tok">--rk-macaroni-500</div></div></div><div class="sw"><div class="chip" style="background:#F8D580"></div><div class="meta"><div class="nm">300</div><div class="hex">#F8D580</div><div class="tok">--rk-macaroni-300</div></div></div><div class="sw"><div class="chip" style="background:#FDF1D2"></div><div class="meta"><div class="nm">100</div><div class="hex">#FDF1D2</div><div class="tok">--rk-macaroni-100</div></div></div></div>
</body></html>
