<!-- @dsCard group="Brand" viewport="700x150" name="Whisk mark" subtitle="Lockup + footer accents ONLY — never a background pattern" -->
<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:24px;background:var(--rk-paper);font-family:var(--rk-font-body);display:flex;gap:16px;align-items:center;}
  .chip{flex:1;display:flex;align-items:center;justify-content:center;height:96px;border-radius:var(--rk-radius-md);border:1px solid var(--rk-border);}
  .light{background:#fff;}
  .cream{background:var(--rk-cream);}
  .dark{background:var(--rk-rhino-700);}
  img{width:120px;height:auto;}
  .note{flex:1.4;font-size:13px;color:var(--rk-text-muted);line-height:1.5;}
  .note b{color:var(--rk-tomato);}
</style></head>
<body>
  <div class="chip light"><img src="../assets/whisk-red.svg" alt="whisk"></div>
  <div class="chip cream"><img src="../assets/whisk-rhino.svg" alt="whisk"></div>
  <div class="chip dark"><img src="../assets/whisk-white.svg" alt="whisk"></div>
  <div class="note"><b>Do:</b> use in the logo lockup and small footer accents.<br><b>Don't:</b> tile it as a background or scatter it as decoration.</div>
</body></html>
