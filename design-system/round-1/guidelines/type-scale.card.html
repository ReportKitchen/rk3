<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="rem tokens, 16px base" -->
<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  *{box-sizing:border-box;}
  body{margin:0;padding:20px 24px;background:var(--rk-paper);font-family:var(--rk-font-body);color:var(--rk-text-body);}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch;}
  .sw{flex:1;min-width:90px;border-radius:var(--rk-radius-sm);overflow:hidden;border:1px solid var(--rk-border);background:#fff;}
  .sw .chip{height:64px;}
  .sw .meta{padding:7px 10px;}
  .sw .nm{font-weight:700;font-size:13px;color:var(--rk-text-strong);}
  .sw .hex{font-family:var(--rk-font-mono);font-size:11px;color:var(--rk-text-muted);letter-spacing:.02em;}
  .sw .tok{font-family:var(--rk-font-mono);font-size:10.5px;color:var(--rk-text-muted);}
  h4{font-family:var(--rk-font-display);margin:0 0 3px;}
  table{border-collapse:collapse;width:100%;font-size:13px;}
td{padding:5px 8px;border-bottom:1px solid var(--rk-border);}
.t{font-family:var(--rk-font-mono);color:var(--rk-text-muted);white-space:nowrap;}
.s{font-family:var(--rk-font-display);color:var(--rk-text-strong);}
</style>
</head><body>
<table>
<tr><td class="t">--rk-text-5xl · 76</td><td class="s" style="font-size:34px">Hero</td></tr>
<tr><td class="t">--rk-text-3xl · 48</td><td class="s" style="font-size:26px">Section title</td></tr>
<tr><td class="t">--rk-text-xl · 28</td><td class="s" style="font-size:20px">Card heading</td></tr>
<tr><td class="t">--rk-text-md · 18</td><td class="s" style="font-size:16px;font-family:var(--rk-font-body)">Body default</td></tr>
<tr><td class="t">--rk-text-sm · 14</td><td class="s" style="font-size:13px;font-family:var(--rk-font-body)">Caption / label</td></tr>
</table>
</body></html>
