<!-- @dsCard group="Components" viewport="960x620" name="Layout — Cards, Sections, Callout, Accordion" subtitle="Content & marketing blocks" -->
<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Mulish:ital,wght@0,300..900;1,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:28px;background:var(--rk-paper);font-family:var(--rk-font-body);}
  .stack{display:flex;flex-direction:column;gap:34px;}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .lab{font-family:var(--rk-font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--rk-text-muted);margin-bottom:12px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, FeatureCard, SectionHeading, Callout, Accordion } = window.ReportKitchenDesignSystem_07c3a7;
  function Demo(){
    return (
      <div className="stack">
        <SectionHeading eyebrow="What we do" title="From PDF to polished site" intro="No reformatting headaches — just a better reader experience." />
        <div>
          <div className="lab">Card · FeatureCard</div>
          <div className="cards">
            <Card client="Enterprise Community Partners" title="Housing2Justice National Toolkit" description="Helping the housing industry better understand and serve the justice-impacted population." coverColor="var(--rk-rhino-700)" coverIcon="scale" coverText="Toolkit" tags={["Housing","Toolkit"]} />
            <FeatureCard icon="wand-sparkles" title="Landing Page Maker" badge="Available now" badgeTone="success" action="Start free" accent="tomato">Upload a PDF and build a landing page for it — in minutes, not weeks.</FeatureCard>
          </div>
        </div>
        <div>
          <div className="lab">Accordion</div>
          <Accordion items={[
            {q:"How does Report Kitchen work?",a:"Send us your PDF. We turn it into an interactive, accessible, fully responsive website your audience will actually use."},
            {q:"Is the output accessible?",a:"Yes — every site is built to meet WCAG AA, with real semantic structure, keyboard navigation and screen-reader support."},
            {q:"Do we get analytics?",a:"Site admins get full analytics on what readers engage with, including layered content like accordions, modals and expanding lists."}
          ]} />
        </div>
        <div>
          <div className="lab">Callout</div>
          <Callout eyebrow="Ready to cook?" title="Your 200-page PDF deserves better than a download button." primaryLabel="Contact the Kitchen" secondaryLabel="See our work">Tell us about your report and we'll show you what's possible.</Callout>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide&&window.lucide.createIcons(), 60);
</script>
</body></html>
