<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="_ds/report-kitchen-design-system-07c3a770-3a5c-47ea-92a3-b45bd72215f0/tokens/fonts.css">
<link rel="stylesheet" href="_ds/report-kitchen-design-system-07c3a770-3a5c-47ea-92a3-b45bd72215f0/tokens/colors.css">
<link rel="stylesheet" href="_ds/report-kitchen-design-system-07c3a770-3a5c-47ea-92a3-b45bd72215f0/tokens/typography.css">
<link rel="stylesheet" href="_ds/report-kitchen-design-system-07c3a770-3a5c-47ea-92a3-b45bd72215f0/tokens/effects.css">
<script src="_ds/report-kitchen-design-system-07c3a770-3a5c-47ea-92a3-b45bd72215f0/_ds_bundle.js"></script>
</helmet>
<div style="display:flex;align-items:center;gap:16px;height:56px;padding:0 20px;background:var(--rk-white);border-bottom:1px solid var(--rk-border);font-family:var(--rk-font-body),sans-serif">
  <img src="assets/logo-red.svg" alt="Report Kitchen" style="height:26px;display:block">
  <span style="font-size:11px;font-weight:800;letter-spacing:0.08em;color:var(--rk-rhino-500);text-transform:uppercase;border:1px solid var(--rk-border-strong);border-radius:var(--rk-radius-pill);padding:3px 9px">Landing Page Maker</span>
  <span style="width:1px;height:22px;background:var(--rk-border)"></span>
  <span style="font-size:14px;font-weight:700;color:var(--rk-text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:330px">Design Principles for Teacher Preparation</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:2px">
    <sc-for list="{{ steps }}" as="s" hint-placeholder-count="4">
      <span style="display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:var(--rk-radius-pill);background:{{ s.bg }};cursor:pointer" style-hover="background:var(--rk-gray-100)">
        <span style="width:21px;height:21px;flex:none;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:{{ s.circBg }};border:{{ s.circBorder }};color:{{ s.circFg }};font-size:11.5px;font-weight:800">{{ s.mark }}</span>
        <span style="font-size:13px;font-weight:700;color:{{ s.labelCol }}">{{ s.name }}</span>
      </span>
      <sc-if value="{{ s.sep }}" hint-placeholder-val="{{ false }}"><i data-lucide="chevron-right" style="width:13px;height:13px;color:var(--rk-gray-300);flex:none"></i></sc-if>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:56},&quot;mode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;assemble&quot;,&quot;wordsmith&quot;],&quot;default&quot;:&quot;assemble&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  componentDidMount() { if (window.lucide) window.lucide.createIcons(); setTimeout(() => window.lucide && window.lucide.createIcons(), 500); }
  renderVals() {
    const activeIdx = (this.props.mode ?? 'assemble') === 'wordsmith' ? 1 : 0;
    const steps = ['Assemble', 'Wordsmith', 'Preview', 'Publish'].map((name, i) => {
      const done = i < activeIdx, active = i === activeIdx;
      return { name, sep: i < 3, mark: done ? '✓' : String(i + 1),
        bg: active ? 'var(--rk-rhino-100)' : 'transparent',
        circBg: active ? 'var(--rk-rhino-700)' : 'var(--rk-white)',
        circBorder: active ? '1px solid var(--rk-rhino-700)' : done ? '1px solid var(--rk-rhino-300)' : '1px solid var(--rk-border-strong)',
        circFg: active ? '#fff' : done ? 'var(--rk-rhino-700)' : 'var(--rk-text-muted)',
        labelCol: active ? 'var(--rk-rhino-900)' : 'var(--rk-text-muted)' };
    });
    return { steps };
  }
}
</script>
</body>
</html>
