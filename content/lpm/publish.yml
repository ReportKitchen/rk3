# lpm.publish.* — the Publish step: the dedicated export surface. Left = the
# promotion kit (social graphic, share-image choice, weekly posts); right =
# getting the page out (CMS copy box, full-page ZIP with a stylesheet choice).

back_to_preview: {kind: static, text: "Preview"}
back_hint: {kind: static, text: "to check the page"}

# the social-graphic card
social_title: {kind: static, text: "Social graphic"}
social_blurb:
  kind: static
  text: "We reformatted your PDF cover into a wide social card — this is what link previews can show when the page is shared."
social_generating:
  kind: static
  text: "Still being generated from your cover — it'll be available here soon."
# the embedded share-image choice
share_image_label: {kind: static, text: "Share preview image"}
share_image_cover: {kind: static, text: "PDF cover"}
share_image_social: {kind: static, text: "Social graphic"}
share_image_hint:
  kind: static
  text: "Embedded in the page for social sites to pick up when someone shares the link."

# the social-posts card (4 suggested posts from the sections pass)
posts_title: {kind: static, text: "Social posts"}
posts_blurb:
  kind: static
  text: "Four ready-to-paste posts drawn from your report — one a week for the next month."
posts_week: {kind: template, text: "Week {n}", tokens: [n]}
posts_copy: {kind: static, text: "Copy"}
posts_copied: {kind: static, text: "Copied"}
posts_generating:
  kind: static
  text: "Still being written from your report — they'll appear here soon."
posts_include_doc: {kind: static, text: "Include as a Word file in the download"}
posts_cadence_hint:
  kind: static
  text: "A report needs more than one launch day — post at least once a week for a month, and paste your page's link at the end of each post."
# the Word file the checkbox bundles
docx_title: {kind: template, text: "Social posts — {title}", tokens: [title]}
docx_intro:
  kind: static
  text: "Promote your report by posting at least once a week for the next month. Paste your page's link at the end of each post."

# copy-and-paste into a CMS (inline-styled fragment; fully self-contained — no
# references back to Report Kitchen, so images/PDF are re-attached in the CMS)
cms_title: {kind: static, text: "Copy and paste into a CMS"}
cms_blurb:
  kind: static
  text: "The whole page as one block of HTML with every style written into its tag — it survives CMS editors that strip style blocks."
cms_step1:
  kind: static
  text: "Copy the HTML and paste it into your page's HTML (code) view."
cms_step2:
  kind: static
  text: "Download the cover below, then put it back where it belongs with your CMS's insert-image tool."
cms_step3:
  kind: static
  text: "Upload your PDF to your site, select each download button, and connect it with your CMS's link tool."
cms_step4:
  kind: static
  text: "Publish — the share buttons pick up the page's address on their own."
cms_copy: {kind: static, text: "Copy the HTML"}
cms_copied: {kind: static, text: "Copied"}
cms_cover_download: {kind: static, text: "Download the cover"}
cms_building: {kind: static, text: "Preparing the HTML…"}
cms_failed:
  kind: static
  text: "Couldn't prepare the inline HTML — try again in a moment."

# download the full page
dl_title: {kind: static, text: "Download full page"}
dl_style_label: {kind: static, text: "Stylesheet"}
dl_embedded: {kind: static, text: "Embedded"}
dl_inline: {kind: static, text: "Inline styles"}
dl_embedded_hint:
  kind: static
  text: "One clean style block in the page head — best when you control the page."
dl_inline_hint:
  kind: static
  text: "Every style written into its tag — for strict CMS editors that strip style blocks."
zip_bundled:
  kind: static
  text: "One folder: the page, its images, and your PDF."
zip_no_pdf:
  kind: static
  text: "One folder: the page and its images — the download button links to your hosted PDF."
download_zip: {kind: static, text: "Download your page (ZIP)"}
download_building: {kind: static, text: "Packing it up…"}
publish_hint:
  kind: static
  text: "Unzip it and upload the folder anywhere on your website — the page is live, and the share buttons pick up its address automatically."
