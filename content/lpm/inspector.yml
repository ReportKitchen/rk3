# lpm.inspector.* — the per-block preview-and-adjust surface (the center column):
# see the block as it'll appear, then make its choices before/while adding it.

preview_label: {kind: static, text: "Preview"}
preview_updates: {kind: static, text: "updates as you pick"}
add: {kind: static, text: "Add to page"}
remove: {kind: static, text: "Remove"}

# welcome panel — shown in the center before anything is selected
welcome.title: {kind: static, text: "Let’s shape your landing page"}
welcome.body:
  kind: static
  text: "We’ve selected what we think are the strongest pieces of your report — but you’re the expert. Click any block on the left to see how it’ll look, adjust it, and choose whether to feature it."
welcome.hint: {kind: static, text: "The outline on the right updates as you go."}

# CTA editing (button text + link)
cta.text_label: {kind: static, text: "Button text"}
cta.url_label: {kind: static, text: "Link (URL)"}
cta.url_ph: {kind: static, text: "https://…"}
cta.download_url_ph: {kind: static, text: "Leave blank to bundle the PDF itself"}

# social share editing
share.networks_label: {kind: static, text: "Networks"}
share.style_label: {kind: static, text: "Button style"}
share.style.plain: {kind: static, text: "Plain"}
share.style.round: {kind: static, text: "Round"}
share.style.square: {kind: static, text: "Square"}
or_drag: {kind: static, text: "or drag it into place"}
reopen_hint: {kind: static, text: "You can reopen this anytime"}
why_block_tab: {kind: static, text: "Why this block"}
preview_tab: {kind: static, text: "Preview & choices"}

# preview meta lines (shown under the rendered sample)
exec.meta: {kind: static, text: "Verbatim from your report — its own words (opening shown)"}
# when the verbatim section is barely there — steer to the AI Summary
exec.short: {kind: static, text: "This is all we could pull verbatim — the AI Summary may read better here."}
exec.empty: {kind: static, text: "We couldn’t pull a verbatim summary from this report. Try the AI Summary instead."}
voice.meta:
  kind: template
  text: "AI-written · about {words} words · fine-tune in Wordsmith"
  tokens: [words]
loading: {kind: static, text: "Drafting"}
ai_failed: {kind: static, text: "Couldn’t draft this one — try another voice."}

# --- Findings: pick which numbers ---
findings.heading:
  kind: template
  text: "We found {n, plural, one {# number} other {# numbers}} in your PDF"
  tokens: [n]
findings.pick_hint: {kind: static, text: "Checked ones appear on the page, in this order. Drag to reorder."}
findings.picked:
  kind: template
  text: "{n} picked · 3–5 read best"
  tokens: [n]
findings.show_more:
  kind: template
  text: "Show {n} more"
  tokens: [n]
findings.add:
  kind: template
  text: "Add with these {n, plural, one {# number} other {# numbers}}"
  tokens: [n]
findings.add_own: {kind: static, text: "+ Add your own number"}
findings.own_stat_ph: {kind: static, text: "42%"}
findings.own_text_ph: {kind: static, text: "what the number measures"}
findings.own_save: {kind: static, text: "Add"}
findings.own_cancel: {kind: static, text: "Cancel"}

# --- AI Summary: pick the voice (the "taste test") ---
voice.subtitle:
  kind: template
  text: "Drafted from all {pages} pages · pick the voice"
  tokens: [pages]
voice.intro.label: {kind: static, text: "Introduce the report"}
voice.intro.note: {kind: static, text: "This report shows…"}
voice.neutral.label: {kind: static, text: "Neutral intro"}
voice.neutral.note: {kind: static, text: "Families today face…"}
voice.hardsell.label: {kind: static, text: "Urgent intro"}
voice.hardsell.note: {kind: static, text: "Time is running out for…"}
voice.try_another: {kind: static, text: "Try another take"}
voice.fine_tune: {kind: static, text: "Fine-tune the words later in Wordsmith"}
voice.add:
  kind: template
  text: "Add the {voice} take"
  tokens: [voice]
voice.use_exec: {kind: static, text: "Prefer the report's own words? Use Exec Summary instead →"}

# --- Storytelling: pick which story / case study ---
story.heading:
  kind: template
  text: "Whose story? · {n, plural, one {# found} other {# found}}"
  tokens: [n]
story.add:
  kind: template
  text: "Add {subject}'s story"
  tokens: [subject]
story.more_words:
  kind: template
  text: "+ {n} more words"
  tokens: [n]
