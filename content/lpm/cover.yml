# lpm.cover.* — the "how the cover sits" layout picker (4 presets around the cover).

question: {kind: static, text: "How should the cover sit?"}
sub: {kind: static, text: "Sized and placed for you — switch anytime."}
control_label: {kind: static, text: "How the cover sits"}
category: {kind: static, text: "Cover"}
# the cover always carries its own metadata (date, authors) wherever it lands
metadata_note:
  kind: template
  text: "The cover carries its metadata — {meta} — wherever it sits."
  tokens: [meta]

beside.title: {kind: static, text: "Cover beside"}
beside.line: {kind: static, text: "Cover on the left, title on the right, content below. The confident default."}

floatRight.title: {kind: static, text: "Cover right"}
floatRight.line: {kind: static, text: "Title on the left, cover on the right, content below. Flips the default."}

textForward.title: {kind: static, text: "Text-forward"}
textForward.line: {kind: static, text: "The cover shrinks to a small thumbnail so the words lead."}
