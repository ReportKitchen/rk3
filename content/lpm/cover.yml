# lpm.cover.* — the "how the cover sits" layout picker (4 presets around the cover).

question: {kind: static, text: "How should the cover sit?"}
sub: {kind: static, text: "Sized and placed for you — switch anytime."}
control_label: {kind: static, text: "How the cover sits"}
category: {kind: static, text: "Cover"}
# the cover always carries its own metadata (date, authors) wherever it lands
metadata_note:
  kind: template
  text: "The cover carries its metadata — {meta} — wherever it sits."
  tokens: [meta]

# title always leads full-width; the cover sits inside or after the first summary
floatRight.title: {kind: static, text: "Float right"}
floatRight.line: {kind: static, text: "The cover floats into the first summary, text wrapping around it. The clean default."}

floatBoxed.title: {kind: static, text: "Boxed, with download"}
floatBoxed.line: {kind: static, text: "The cover floats into the summary in a shaded card, a download button under it."}

band.title: {kind: static, text: "Detail band"}
band.line: {kind: static, text: "A shaded band after the summary: cover, title, and a download button."}
