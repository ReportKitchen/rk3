# lpm.assemble.* — copy shown in the Landing Page Maker's Assemble screen only.

# Screen header (the mock's "What should this page say?" question).
header: {kind: static, text: "What should this page say?"}

# whisk-loader caption while the sections engine reads the document
loading: {kind: static, text: "Reading your report"}

# The "we found N …" lines. Tokens are declared; the frontend renders full ICU
# so "1 story" vs "8 stories" lives in the string, not in code. To reword this
# ("Stories reach people and we found {n} in your document") edit `text` — same
# token, live on next render.
story_count:
  kind: template
  text: "We found {n, plural, one {# story} other {# stories}} in your PDF"
  tokens: [n]

stat_count:
  kind: template
  text: "We found {n, plural, one {# stat} other {# stats}} worth featuring"
  tokens: [n]

# The opening line can be AI-written per document when AI is on; the fallback is
# a plain, always-safe version for when the user has AI turned off.
intro_line:
  kind: ai
  model: claude-haiku-4-5
  prompt: >
    Write one warm, plainspoken sentence telling the user we read their
    {pages}-page report and drafted a starting page from its strongest material.
    No hype. One sentence.
  fallback: "We read all {pages} pages and drafted a page from the strongest material."
  tokens: [pages]

# the instructional half of the subhead (the AI "we read your report" half is
# intro_line above)
subhead_action:
  kind: static
  text: "Add, swap, or drop blocks below — each card tells you when it earns its place."

# the right-rail outline of the page
page_heading: {kind: static, text: "Landing Page Outline"}

# nudge from the preview toward Wordsmith
wordsmith_nudge:
  kind: static
  text: "Structure look right? Switch to Wordsmith to read it top to bottom and fix the wording."

# Block-card copy (what each block is / when to use) lives in lpm/blocks.yml.
