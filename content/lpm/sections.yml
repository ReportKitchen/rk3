# lpm.sections.* — the AI content-sections rebuild (BACKLOG/61). "Highlights" =
# the meaningful sections the AI pulled from the document (the star of Assemble);
# the CTA scaffolding sits beside them.

intro.title: {kind: static, text: "Introduction"}
intro.sub:
  kind: template
  text: "How the page opens — {n, plural, =0 {your report’s opening} one {# section pulled from your document} other {# sections pulled from your document}}{ai, select, yes {, plus a concise summary we drafted} other {}}."
  tokens: [n, ai]

# The AI Summary — the ONE section AI writes (a pitch in a voice you pick), not
# your report's words. Opt-in; lives in the Introduction group.
ai.heading: {kind: static, text: "AI Summary"}
ai.caption: {kind: static, text: "Concise introduction in one of several tones."}
ai.badge: {kind: static, text: "AI-written"}
ai.voice_label: {kind: static, text: "Pick the voice"}
highlights.title: {kind: static, text: "Highlights"}
highlights.sub: {kind: static, text: "The meaningful bits we pulled from your report — pick what to feature."}
cta.title: {kind: static, text: "Call to action"}
cta.sub: {kind: static, text: "What you want the reader to do."}

# shown when AI is off (the functional fallback)
noai_notice:
  kind: static
  text: "AI is off — showing your report’s own summary plus a couple of sections to fill in yourself."
# shown when AI is ON but the generation call FAILED (e.g. out of credits) — don't
# pretend it's a normal page; say what happened and how to retry
error_notice:
  kind: template
  text: "AI couldn’t generate sections — showing a basic version. Reopen this tab to retry. ({reason})"
  tokens: [reason]
empty: {kind: static, text: "No sections yet — turn AI on, or add wording in Wordsmith."}

# presentation-primitive labels (shown on cards + in the inspector's how-it-looks control)
pres.prose: {kind: static, text: "Prose"}
pres.bullets: {kind: static, text: "Bullets"}
pres.statCards: {kind: static, text: "Stat cards"}
pres.quote: {kind: static, text: "Quote"}
pres.steps: {kind: static, text: "Steps"}

# inspector: adjust how a section looks
how_label: {kind: static, text: "How it looks"}
# quote treatments (design-system/quotes 5a–5f) — a settable pullquote look
quote.eyebrow: {kind: static, text: "In their words"}
quote.treatment.glyph: {kind: static, text: "Glyph"}
quote.treatment.poster: {kind: static, text: "Poster"}
quote.treatment.framed: {kind: static, text: "Framed"}
quote.treatment.editorial: {kind: static, text: "Editorial"}
quote.treatment.tint: {kind: static, text: "Tint"}
quote.treatment.dark: {kind: static, text: "Dark"}
quote.treatment.standard: {kind: static, text: "Standard"}
# stat treatments (design-system/stats) — how the numbers are plated
treatment_label: {kind: static, text: "How the numbers look"}
treatment.cards: {kind: static, text: "Cards"}
treatment.list: {kind: static, text: "List"}
treatment.icons: {kind: static, text: "Icons"}
treatment.tiles: {kind: static, text: "Tiles"}
treatment.band: {kind: static, text: "Dark band"}
treatment.hero: {kind: static, text: "Hero"}
treatment.bars: {kind: static, text: "Bars"}
# prose length trim (long summaries)
length_label: {kind: static, text: "Length"}
length.full: {kind: static, text: "Full"}
length.trimmed: {kind: static, text: "Trimmed"}
length.trimmed_note:
  kind: template
  text: "Trimmed to about {n} words at a paragraph break. Fine-tune in Wordsmith."
  tokens: [n]
# the note under a placeholder (no-AI) section
placeholder_hint: {kind: static, text: "Nothing here yet — you’ll add this in Wordsmith."}
drag_hint: {kind: static, text: "Drag to reorder"}
