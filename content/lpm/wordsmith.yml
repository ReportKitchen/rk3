# lpm.wordsmith.* — the light top-to-bottom text-cleanup mode.

back_to_assemble: {kind: static, text: "Assemble"}
back_to_assemble_hint: {kind: static, text: "to change what's on the page"}
# reading estimate above the page
read_estimate:
  kind: template
  text: "{words} words · reads in about {min} min"
  tokens: [words, min]
help:
  kind: static
  text: "Click any line and type. Bold, italics, lists, and links — that's the whole toolbox, on purpose."
nudge_back:
  kind: static
  text: "Wrong blocks, not wrong words? Head back to Assemble."

# toolbar tooltips + the inline link editor (no browser dialogs)
tool.bold: {kind: static, text: "Bold"}
tool.italic: {kind: static, text: "Italic"}
tool.list: {kind: static, text: "Bulleted list"}
tool.link: {kind: static, text: "Add or edit link"}
tool.clear: {kind: static, text: "Clear formatting"}
link.placeholder: {kind: static, text: "Paste or type a URL"}
link.newtab: {kind: static, text: "Open in a new window"}
link.apply: {kind: static, text: "Apply"}
link.remove: {kind: static, text: "Remove"}
