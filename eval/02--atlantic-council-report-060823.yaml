doc: 02--atlantic-council-report-060823

# Atlantic Council report — dense two-column layout. Reviewer notes center on
# column reading-order (the keystone) and over-split paragraphs from column
# breaks.
checks:
  # p6 acknowledgements: the two signature blocks (Jason Marczak, Pepe Zhang)
  # belong BELOW the "We are also grateful …" paragraph. Today Jason reads ahead
  # of it (column scramble); Pepe already reads after (kept as a regression guard).
  - note: "p6: 'Jason Marczak' signature reads after 'We are also grateful'"
    stage: analyze
    order: ["We are also grateful for the analytical", "Jason Marczak Senior Director"]

  - note: "p6: 'Pepe Zhang' signature reads after 'We are also grateful' (guard)"
    stage: analyze
    order: ["We are also grateful for the analytical", "Pepe Zhang Senior Fellow"]

  # p15: a single body paragraph was split across the column break — "In addition
  # to the size of its individual markets …" and its continuation "aided by
  # factors such as common languages" are one paragraph (reviewer confirms the
  # ordering is right; only the split is wrong).
  - note: "p15: over-split body paragraph is one node"
    stage: analyze
    merge: ["In addition to the size of its individual markets", "aided by factors such as common languages"]

  - freeze:
      anchor: Enhancing market size, scalability, and regional integration
      html: <ol type="decimal"><li><strong>Enhancing market size, scalability, and regional integration:</strong>
        strengthening the hard and soft infrastructure supporting the region’s economies, while drawing
        them closer together through trade, regulatory, and other integration.</li><li><strong>Accelerating
        digitalization and innovation:</strong> improving infrastructure, fostering skills, and promoting
        adoption to help the region transform its digital potential into development gains.</li><li><strong>Improving
        state governance, institutional capacity, and transparency:</strong> enhancing institutional capacity,
        integrity, government-service delivery, and regulatory quality in LAC through technological, governance,
        and other cooperation with the public sector.</li><li><strong>Addressing multidimensional inequality:</strong>
        reducing gender inequality, leveling the playing field between SMEs and large firms, narrowing the
        urban-rural divide, and preparing for global shocks to enable a more prosperous, inclusive economy
        for LAC.</li><li><strong>Meaningfully advancing the green agenda:</strong> helping advance the green
        agenda by working to create green jobs, taking measures to promote a transition to a circular-economy
        model, and partaking in green finance.</li></ol>

  # GOLD(figures F1) p10 (target, note 80f32560): the Figure 1 chart is a
  # <figure> "down to the Source" — title + chart + SOURCE line together.
  - note: "GOLD(fig) p10 (target): Figure 1 anatomy holds title + SOURCE"
    in_figure: ["Figure 1. In the last ten years", "SOURCE: Atlantic Council survey 2022"]

  - note: "GOLD(fig) p10 (target): chart legend claimed into the image"
    claimed: ["optimists pessimists"]

  # GOLD(figures F2) p12 (targets, note e1aad018): each chart is its OWN
  # figure holding its own title+SOURCE — today one fused crop bakes both
  # titles in while "Figure 2"/"Figure 3" also render live (duplicates).
  - note: "GOLD(fig) p12 (target): Figure 2 anatomy, unfused from Figure 3"
    in_figure: ["Figure 2. Overall LAC attractiveness", "SOURCE: Atlantic Council survey 2022"]
    not_with: "Figure 3. Pessimists"

  - note: "GOLD(fig) p12 (target): Figure 3 anatomy, unfused from Figure 2"
    in_figure: ["Figure 3. Pessimists", "SOURCE: Atlantic Council survey 2022"]
    not_with: "Figure 2. Overall LAC attractiveness"

  - note: "GOLD(fig) p12 (guard): the two figure titles stay separate nodes"
    split: ["Figure 2. Overall LAC attractiveness", "Figure 3. Pessimists"]

  # GOLD(§6.2 tables) p7 (owner note b0399c90 "quite a bit of format missing"):
  # the "OPPORTUNITY #N" tables print a full-width RED band as their header, but
  # header detection required every column filled, and the band's title spans one
  # cell (col 0 empty) — so header=false and the red headBg (#c02026, already
  # captured in style) was never applied; the band rendered on the pink body fill.
  # RED-AT-PLANT 2026-07-07: header=false in the §6.1 table-model census + IR probe.
  - note: "GOLD(§6.2): p7 Opportunity-1 table's red band IS a header (headBg applied)"
    table: { textPrefix: "OPPORTUNITY #1", header: true, headBg: "#c02026" }
