doc: 02--oxfam-davos-2024-report

# Oxfam's Davos report is a heavily two-column policy report. Reviewer notes
# cluster on column reading-order scrambles (the keystone defect) plus a header
# that got fused with a second-column line, plus an un-reconstructed bullet list.
checks:
  # p5 (Sanders foreword): a two-column page the reviewer flagged as scrambled —
  # "Each and every year, Oxfam does an extraordinary job" must read before "While
  # millions of people … live in dire poverty". The committed multi-column port
  # already fixed this; kept as a regression guard for the column engine.
  - note: "p5: foreword columns in reading order ('Each and every year' first)"
    stage: analyze
    order: ["Each and every year, Oxfam does an extraordinary", "While millions of people throughout the world live in dire poverty"]

  # p11 big scramble: the section header is "A new era of monopoly: the
  # supercharging of corporate power", then body "We are living through an era of
  # monopoly", and "consolidation within Africa" is the TOP of the second column —
  # so it must read AFTER the body opener, not before it. Today a cross-column
  # line-merge fuses "supercharging" with "consolidation within Africa" into the
  # page's first node, dragging it ahead of everything.
  - note: "p11: body opener precedes the second-column 'consolidation within Africa'"
    stage: analyze
    order: ["We are living through an era of monopoly", "consolidation within Africa"]

  - note: "p11: 'A new era of monopoly' is a heading, not body text"
    stage: analyze
    role: { text: "A new era of monopoly", is: heading }

  # GOLD(col) p10 (guards): the reviewer flagged a column swap here ("this
  # should be the second column — the one below it comes first"); the page
  # now reads correctly after the assemble column-fusion fixes. Pin the
  # correct flow so the column-engine work can't silently regress it.
  - note: "GOLD(col) p10 (guard): first-column body precedes the Oxfam research paragraph"
    order: ["Sharply increasing billionaire wealth", "New research by Oxfam illuminates"]

  - note: "GOLD(col) p10 (guard): research paragraph precedes 'Billionaire owners use this control'"
    order: ["New research by Oxfam illuminates", "Billionaire owners use this control"]

  # GOLD(figures) p4 (guard, note a92c2999 "great job identifying and
  # marking up the figure and caption"): keep it that way.
  - note: "GOLD(fig) p4 (guard): photo caption stays inside its figure"
    in_figure: ["Beijing skyline, China. Photo by Li Yang"]
