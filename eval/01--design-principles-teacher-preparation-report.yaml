doc: 01--design-principles-teacher-preparation-report

# Design Principles report — long single-column body with many genuine lists.
# Reviewer flagged a UL broken in two across a page break (p34→p35): the SEL
# competencies are one bulleted list but split into two list nodes.
checks:
  - note: "p34→35: SEL competency bullets are ONE list (not split over the page break)"
    stage: analyze
    list:
      - "become aware of their emotions"
      - "learn how to manage their emotions"
      - "interact well with others"
      - "understand how their behavior affects"
      - "set goals both personally and academically"
      - "make appropriate decisions that help them"

  # p7 / p46: tagged numbered lists ("1. / 2. / 3." with an InDesign en-space)
  # must be emitted as a real <ol> with the markers stripped — not a <ul> with
  # the numbers fossilized into the item text.
  - note: "p7: professional-responsibility items are an <ol> (numbers stripped)"
    stage: analyze
    ordered: decimal
    list:
      - "To act in the best interests of the client"
      - "To identify, master, and continue to advance"
      - "To develop shared standards of practice"

  - note: "p46: learning-principles items are an <ol> (numbers stripped)"
    stage: analyze
    ordered: decimal
    list:
      - "Students come to the classroom with prior knowledge"
      - "Students need to organize and use knowledge conceptually"
      - "Students learn more effectively if they take a metacognitive"
