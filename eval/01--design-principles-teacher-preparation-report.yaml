doc: 01--design-principles-teacher-preparation-report

# Design Principles report — long single-column body with many genuine lists.
# Reviewer flagged a UL broken in two across a page break (p34→p35): the SEL
# competencies are one bulleted list but split into two list nodes.
checks:
  - note: "p34→35: SEL competency bullets are ONE list (not split over the page break)"
    stage: analyze
    list:
      - "become aware of their emotions"
      - "learn how to manage their emotions"
      - "interact well with others"
      - "understand how their behavior affects"
      - "set goals both personally and academically"
      - "make appropriate decisions that help them"

  # p7 / p46: tagged numbered lists ("1. / 2. / 3." with an InDesign en-space)
  # must be emitted as a real <ol> with the markers stripped — not a <ul> with
  # the numbers fossilized into the item text.
  - note: "p7: professional-responsibility items are an <ol> (numbers stripped)"
    stage: analyze
    ordered: decimal
    list:
      - "To act in the best interests of the client"
      - "To identify, master, and continue to advance"
      - "To develop shared standards of practice"

  - note: "p46: learning-principles items are an <ol> (numbers stripped)"
    stage: analyze
    ordered: decimal
    list:
      - "Students come to the classroom with prior knowledge"
      - "Students need to organize and use knowledge conceptually"
      - "Students learn more effectively if they take a metacognitive"

  - note: italics and links in basic paragraph
    freeze:
      anchor: 'This report follows on the heels of a companion effort by a '
      html: 'This report follows on the heels of a companion effort by a body of researchers and practitioners
        to define design principles for schools that seek to enact insights from the science of learning
        and development. That report is titled <a href="https://k12.designprinciples.org/"><em>Design Principles
        for Schools: Putting the Science of Learning and Development Into Action</em></a> and begins with
        the following preface:'

  - note: 3 step OL
    freeze:
      anchor: Students come to the classroom with prior knowledge and expe
      html: <ol type="decimal"><li>Students come to the classroom with prior knowledge and experiences that
        must be addressed if teaching is to be effective.</li><li>Students need to organize and use knowledge
        conceptually if they are to apply it beyond the classroom.</li><li>Students learn more effectively
        if they take a metacognitive approach that allows them to consciously assess and manage their own
        learning.</li></ol>

  - note: 'freeze: Darling-Hammond, L., Flook, L., Cook-Harvey,'
    stage: analyze
    freeze:
      anchor: Darling-Hammond, L., Flook, L., Cook-Harvey, C., Barron, B.,
      html: <ul><li>Darling-Hammond, L., Flook, L., Cook-Harvey, C., Barron, B., & Osher, D. (2020). Implications
        for educational practice of the science of learning and development. <em>Applied Developmental Science</em>,
        24(2),97–140. <a href="https://doi.org/10.1080/10888691.2018.1537791">https://doi.org/10.1080/10888691.2018.1537791</a></li><li>Darling-Hammond,
        L., Flook, L., Schachner, A., & Wojcikiewicz, S. (with Cantor, P., & Osher, D.). (2022). <em>Educator
        learning to enact the science of learning and development</em>. Learning Policy Institute. <a href="https://doi.org/10.54300/859.776">https://doi.org/10.54300/859.776</a></li><li>Darling-Hammond,
        L., Oakes, J., Wojcikiewicz, S. K., Hyler, M. E., Guha, R., Podolsky, A., Kini, T., Cook-Harvey,
        C., Mercer, C., & Harrell, A. (2019). <em>Preparing teachers for deeper learning</em>. Harvard Education
        Press.</li></ul>

  - note: 'freeze: To act in the best interests of the client'
    stage: analyze
    freeze:
      anchor: To act in the best interests of the client
      html: <ol type="decimal"><li>To act in the best interests of the client</li><li>To identify, master,
        and continue to advance a shared body of knowledge that is used to make decisions that further the
        client’s welfare</li><li>To develop shared standards of practice that evolve as knowledge evolves
        in the profession</li></ol>

  # GOLD(figures F1) p10 (target, notes 7b850cd8 + f9d468e2): Figure ES.1 =
  # title + wheel image + Source line in ONE <figure>. At plant (v168): no
  # figure node exists — the region became an aside of leaked diagram labels
  # (letter soup from the rotated ring text), the title is a stray heading,
  # the Source line a stray paragraph.
  - note: "GOLD(fig) p10 (target): ES.1 title + Source line live in ONE figure"
    in_figure: ["Figure ES.1. Guiding Principles for Enacting", "Source: Learning Policy Institute & EdPrepLab. (2024)"]

  # GOLD(figures F4) p10 (target): the wheel's interior labels render inside
  # the image pixels, never as live paragraphs.
  - note: "GOLD(fig) p10 (target): wheel labels claimed into the figure image"
    claimed: ["Teaching That Supports Student Thriving", "DEEPLY KNOWLEDGEABLE"]
