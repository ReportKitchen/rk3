doc: 02--good-food-building-the-agricultural-bioeconomy

# Good Food policy brief — bullet lists throughout are NOT reconstructed (the IR
# has zero list nodes; every bullet is a standalone paragraph beginning "●"/"○").
# These `list` checks pin the missing list-reconstruction feature. Plus a p3
# paragraph split across a column break.
checks:
  # p3: a single recommendation paragraph is split — "The Department of Energy can
  # advance agricultural innovations …" continues into "commercialization of
  # innovative agricultural technologies".
  - note: "p3: over-split DOE paragraph is one node"
    stage: analyze
    merge: ["The Department of Energy can advance agricultural innovations", "commercialization of innovative agricultural technologies"]

  # p8: four "●" bullets under "the following actions" should be one UL.
  - note: "p8: four bullets form one list"
    stage: analyze
    list:
      - "To ensure that U.S. researchers remain the best in the world"
      - "To reap the benefits of private innovation"
      - "To create jobs and new economic opportunities"
      - "To ensure America remains the home of Food Freedom"

  # p9: header "Prioritize biomanufacturing-enabled food production" has 3 bullets.
  - note: "p9: three bullets under 'Prioritize biomanufacturing' form one list"
    stage: analyze
    list:
      - "To create new opportunities for America"
      - "Leverage private investments by partnering"
      - "Work with Congress to codify food biomanufacturing"

  # p11: "Recognize American Centers of Excellence" recommendation has 3 bullets.
  - note: "p11: three bullets under 'Recognize American Centers' form one list"
    stage: analyze
    list:
      - "Prioritize the creation of research centers"
      - "Support at least five of these Centers"
      - "Work with Congress to codify these research centers"

  # GOLD(lists L2) p9 (target, owner note 77bbd84c): the four "○" items are a
  # level-3 sub-list NESTED inside the "● Build on successes…" item. At plant
  # time (v158): "Build on successes" is a bare paragraph with a literal ●,
  # the ○ list is flat, and "● Capitalize on this success" was absorbed into
  # the ○ list at the WRONG level. Both checks red at plant.
  - note: "GOLD(lists) p9 (target): ○ items nest under the 'Build on successes' bullet"
    stage: analyze
    nested: ["Build on successes in blue-sky research", "Improving variations and uses of soybeans"]

  - note: "GOLD(lists) p9 (target): the two ● bullets are siblings of ONE list"
    stage: analyze
    list:
      - "Build on successes in blue-sky research"
      - "Capitalize on this success by expanding this ARS initiative"
