doc: 02--edf-ir23-digital-pages

# EDF IR23 is a clean magazine-style annual report. Page 3 is a two-column
# "Thank you" letter; pages 5–6 are image+text rows with drop caps. Our column
# DETECTION mis-fired (a centered "THANK YOU" kicker straddles the gutter and
# defeats the empty-gutter test), so the whole left column should read before
# the right; it interleaved before the multi-column port.
#
# The first two checks are the same order assertion at two stages: `assemble`
# already had the columns as separate blocks in the right order, and since the
# multi-column port `analyze` orders them correctly too — both PASS now. (Was
# assemble-PASS / analyze-FAIL before the port, which pinned the bug to analyze.)
checks:
  - note: "p3: assemble keeps the columns separate & ordered (left block before right)"
    stage: assemble
    order: ["In China, we continued", "You advanced our community work"]

  - note: "p3: IR reading order runs the whole left column before the right"
    stage: analyze
    order: ["In China, we continued", "You advanced our community work"]

  - note: "p3: left-column body precedes the right-column continuation"
    stage: analyze
    order: ["This year, your generosity", "Reduction Act are well-spent"]

  - note: "p5 section title is a heading"
    stage: analyze
    role: { text: "METHANE REDUCTION POLICIES WITH TEETH", is: heading }

  - note: "p6 section title is a heading"
    stage: analyze
    role: { text: "MAKING THE INVISIBLE MEASURABLE", is: heading }

  - note: "running footer 'EDF IMPACT 2023' is not a heading"
    stage: analyze
    role: { text: "EDF IMPACT 2023", is: not-heading }

  # p3: the EDF letter splits a single paragraph across a column break — "And in
  # the U.S., …" and its continuation "Reduction Act are well-spent" are one para.
  - note: "p3: over-split letter paragraph is one node"
    stage: analyze
    merge: ["And in the U.S., we are working to ensure", "Reduction Act are well-spent"]

  # p5: three drop-cap columns. The reviewer flagged "In the United States alone,
  # some 18 million people" as the first paragraph, ahead of the "oil and gas well
  # near Bill Suan" column. Today they read in the wrong order.
  - note: "p5: 'United States alone' column reads before the 'oil and gas well' column"
    stage: analyze
    order: ["United States alone, some 18 million people", "oil and gas well near Bill Suan"]

  # p6: the MethaneAIR sentence is scrambled — its tail "for these regions, so
  # reductions can be tracked" reads ahead of its own opening "methane-measuring
  # jet, flew over major U.S".
  - note: "p6: MethaneAIR sentence body precedes its trailing clause"
    stage: analyze
    order: ["methane-measuring jet, flew over major", "for these regions, so reductions can be tracked"]

  # GOLD(col) p7 (target, owner note 2026-07-02 n91d5857073): columns ran
  # together — "Day and evening" opens a new paragraph (and column); it sits
  # welded at offset ~475 of the preceding node.
  - note: "GOLD(col) p7 (target): 'Day and evening' starts its own node (column weld)"
    split: ["through improved science, data", "Day and evening"]
