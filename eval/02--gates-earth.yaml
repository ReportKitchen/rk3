doc: 02--gates-earth

# Page 8 (Executive Summary) and page 6 (Foreword) lead each two-column body
# with a BOLD LEDE in the left column. Its lines share baselines with the right
# column and get spliced together ("...the world has pursued these investments
# undermine..."), so the page reads scrambled even though it's detected as two
# columns. The bold lede is also mis-typed as a heading.
#
# This is a SEPARATE, pre-existing bug from the column-detection port. Page 8 IS
# detected as two-column (split 328.9); the stage pairing below localizes the
# fault to analyze: PASS at assemble (blocks correctly ordered) but FAIL in the
# IR. Likely cause — a merged cross-column line ("...the world has pursued these
# investments undermine...") yields a wide block that _flow_order mistakes for a
# full-width band separator, breaking the left→right flow. Pinned for the
# find-and-fix spree; expected to FAIL until then.
checks:
  - note: "p8: left-column body precedes the right column (at assemble)"
    stage: assemble
    order: ["That assumption no longer holds", "of countries, companies and communities"]

  - note: "p8: left-column body precedes the right column (in the IR)"
    stage: analyze
    order: ["That assumption no longer holds", "of countries, companies and communities"]
