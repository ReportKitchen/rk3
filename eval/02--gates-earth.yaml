doc: 02--gates-earth

# Page 8 (Executive Summary) and page 6 (Foreword) lead each two-column body
# with a BOLD LEDE in the left column. Its lines share baselines with the right
# column and get spliced together ("...the world has pursued these investments
# undermine..."), so the page reads scrambled even though it's detected as two
# columns. The bold lede is also mis-typed as a heading.
#
# This is a SEPARATE, pre-existing bug from the column-detection port. Page 8 IS
# detected as two-column (split 328.9); the stage pairing below localizes the
# fault to analyze: PASS at assemble (blocks correctly ordered) but FAIL in the
# IR. Likely cause — a merged cross-column line ("...the world has pursued these
# investments undermine...") yields a wide block that _flow_order mistakes for a
# full-width band separator, breaking the left→right flow. Pinned for the
# find-and-fix spree; expected to FAIL until then.
checks:
  - note: "p8: left-column body precedes the right column (at assemble)"
    stage: assemble
    order: ["That assumption no longer holds", "of countries, companies and communities"]

  - note: "p8: left-column body precedes the right column (in the IR)"
    stage: analyze
    order: ["That assumption no longer holds", "of countries, companies and communities"]

  # GOLD(col) p9 (target): the "• For countries: …" fragment is a stray
  # paragraph with a literal bullet char; it belongs in the key-findings list
  # with "For communities" / "For companies" (reviewer note nd6d8031b6b).
  - note: "GOLD(col) p9 (target): 'For countries' joins the key-findings list"
    list: ["For communities", "For companies", "For countries: Adaptation interventions"]

  # GOLD(lists) p17 (target, owner note ned1aa08175 — previously
  # MIS-ATTRIBUTED to clean-air in the lists plan): the four bold-led
  # enabler items are ONE list flowing across the column gutter; today they
  # split 2+2 at the gutter (L4 x lists-in-columns). Source page also shows
  # the parent bullet "Turning the resilience opportunity…" welded into the
  # intro paragraph, and the Table 1 caption interleaving between the two
  # half-lists (ordering defect) — same fix cluster.
  - note: "GOLD(lists) p17 (target): four enabler items form one list across the column gutter"
    list: ["Pricing resilience risks and returns", "Developing a shared risk typology", "Improving access to physical risk data", "Tracking progress and positive outcomes"]
