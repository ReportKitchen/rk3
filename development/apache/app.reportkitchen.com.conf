# app.reportkitchen.com -> RK3 (FastAPI on 127.0.0.1:8300)
# Staged as :80 only. After DNS points here, `certbot --apache -d
# app.reportkitchen.com` clones this into a TLS vhost (choose the redirect
# option) — the proxy directives carry over.
<VirtualHost *:80>
    ServerName app.reportkitchen.com

    ProxyPreserveHost On
    # tells uvicorn (--proxy-headers) the outside scheme, so session cookies
    # get Secure once TLS terminates here
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}

    ProxyPass / http://127.0.0.1:8300/
    ProxyPassReverse / http://127.0.0.1:8300/
</VirtualHost>
