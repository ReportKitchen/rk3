# auth.reportkitchen.com -> ZITADEL (127.0.0.1:9800)
# Staged as :80 only; `certbot --apache -d auth.reportkitchen.com` creates the
# TLS vhost. ZITADEL validates the Host header against its ExternalDomain, so
# ProxyPreserveHost is REQUIRED — and at cutover ZITADEL's config must change
# to ExternalDomain=auth.reportkitchen.com (see the cutover runbook).
<VirtualHost *:80>
    ServerName auth.reportkitchen.com

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}

    ProxyPass / http://127.0.0.1:9800/
    ProxyPassReverse / http://127.0.0.1:9800/
</VirtualHost>
